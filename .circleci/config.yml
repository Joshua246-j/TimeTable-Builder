version: 2.1

# ---------------------------------------------------------------------------
# Pipeline:  test -> build & push (ECR) -> provision infra (CloudFormation)
#
# provision_infra is idempotent: it checks whether the CloudFormation stack
# "iis-${ENVIRONMENT}" exists and creates it if absent, otherwise applies any
# changes. It passes ImageTag=$CIRCLE_SHA1, so CloudFormation updates the ECS
# task definitions and performs the rolling deployment itself — no separate
# ECS update step is needed.
#
# Required environment variables (set on a CircleCI Context, e.g. "aws-iis"):
#   AWS_REGION              e.g. us-east-1
#   ENVIRONMENT             stack name + CFN EnvironmentName (e.g. dev -> stack iis-dev)
#   DB_PASSWORD             RDS master password (NoEcho param; >= 8 chars)
#   DB_USERNAME             (optional) RDS master username; defaults to iis_admin
#   AWS auth — either:
#     AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY, or
#     OIDC via AWS_OIDC_ROLE_ARN (recommended) — see aws-cli/setup below.
# ---------------------------------------------------------------------------

orbs:
  aws-cli: circleci/aws-cli@5.1

executors:
  python:
    docker:
      - image: cimg/python:3.13
  machine:
    machine:
      image: ubuntu-2404:current

jobs:
  test:
    parameters:
      service:
        type: string
    executor: python
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            cd services/<< parameters.service >>
            pip install -r requirements.txt pytest
      - run:
          name: Run tests
          command: |
            cd services/<< parameters.service >>
            python -m pytest -q

  build_and_push:
    parameters:
      service:
        type: string
    executor: machine
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: $AWS_OIDC_ROLE_ARN
          region: $AWS_REGION
      - run:
          name: Build and push image to ECR
          command: |
            set -euo pipefail
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            REPO="iis-<< parameters.service >>"

            # Ensure the ECR repository exists.
            aws ecr describe-repositories --repository-names "$REPO" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$REPO" \
                   --image-scanning-configuration scanOnPush=true >/dev/null

            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$REGISTRY"

            docker build \
              -t "$REGISTRY/$REPO:$CIRCLE_SHA1" \
              -t "$REGISTRY/$REPO:latest" \
              "services/<< parameters.service >>"

            docker push "$REGISTRY/$REPO:$CIRCLE_SHA1"
            docker push "$REGISTRY/$REPO:latest"

  provision_infra:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: $AWS_OIDC_ROLE_ARN
          region: $AWS_REGION
      - run:
          name: Provision / update infrastructure (CloudFormation)
          command: |
            set -euo pipefail
            STACK_NAME="iis-${ENVIRONMENT}"
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

            # Check whether the stack is already in position.
            if aws cloudformation describe-stacks --stack-name "$STACK_NAME" >/dev/null 2>&1; then
              echo "Stack '$STACK_NAME' exists — applying any changes."
            else
              echo "Stack '$STACK_NAME' not found — creating it."
            fi

            # Idempotent create-or-update. ImageTag=$CIRCLE_SHA1 changes the task
            # definitions, so CloudFormation rolls out the new images. RDS keeps its
            # password across updates; DB_PASSWORD must match the original on updates.
            aws cloudformation deploy \
              --stack-name "$STACK_NAME" \
              --template-file infra/cloudformation/template.yaml \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset \
              --parameter-overrides \
                EnvironmentName="$ENVIRONMENT" \
                EcrRegistry="$REGISTRY" \
                ImageTag="$CIRCLE_SHA1" \
                DBUsername="${DB_USERNAME:-iis_admin}" \
                DBPassword="$DB_PASSWORD"

            echo "Infrastructure is in position. Stack outputs:"
            aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
              --query 'Stacks[0].Outputs' --output table

workflows:
  build-test-provision:
    jobs:
      - test:
          name: test-<< matrix.service >>
          context: aws-iis
          matrix:
            parameters:
              service: [iam, campus, commerce, observability]

      - build_and_push:
          name: build-<< matrix.service >>
          context: aws-iis
          matrix:
            parameters:
              service: [iam, campus, commerce, observability]
          requires:
            - test-<< matrix.service >>
          filters:
            branches:
              only: main

      # Runs once all images for this commit are in ECR, so a first-time stack
      # creation has images to pull. Creates the stack if absent, else updates it.
      - provision_infra:
          context: aws-iis
          requires:
            - build-iam
            - build-campus
            - build-commerce
            - build-observability
          filters:
            branches:
              only: main
