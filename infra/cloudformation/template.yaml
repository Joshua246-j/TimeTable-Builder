              - { Name: DB_USER, Value: !Ref DBUsername }
          Secrets:
            # prod: Aurora-managed secret (username + password).
            # non-prod: SSM SecureString holds the password only.
            - Name: DB_PASSWORD
              ValueFrom: !If
                - IsProd
                - !Sub "${DBCluster.MasterUserSecret.SecretArn}:password::"
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/iis/${EnvironmentName}/db-password"
            - !If
              - IsProd
              - Name: DB_USER
                ValueFrom: !Sub "${DBCluster.MasterUserSecret.SecretArn}:username::"
              - !Ref "AWS::NoValue"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ObservabilityLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: observability

  ObservabilityService:
    Type: AWS::ECS::Service
    DependsOn: ObservabilityListenerRule
    Properties:
      ServiceName: !Sub "${EnvironmentName}-observability"
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      TaskDefinition: !Ref ObservabilityTaskDefinition
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: observability
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ObservabilityTargetGroup

  # ----------------------- API Gateway (HTTP API) -----------------------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${EnvironmentName}-iis-api"
      ProtocolType: HTTP

  ApiVpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !Sub "${EnvironmentName}-iis-vpclink"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VpcLinkSecurityGroup

  AlbIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId: !Ref ApiVpcLink
      IntegrationUri: !Ref Listener
      PayloadFormatVersion: "1.0"

  RouteIam:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /iam/{proxy+}"
      Target: !Sub "integrations/${AlbIntegration}"

  RouteCampus:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /campus/{proxy+}"
      Target: !Sub "integrations/${AlbIntegration}"

  RouteCommerce:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /commerce/{proxy+}"
      Target: !Sub "integrations/${AlbIntegration}"

  RouteObservability:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "ANY /observability/{proxy+}"
      Target: !Sub "integrations/${AlbIntegration}"

  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

# ===========================================================================
# Outputs
# ===========================================================================
Outputs:
  ApiEndpoint:
    Description: Public HTTPS endpoint for the platform
    Value: !GetAtt HttpApi.ApiEndpoint
  ClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster
  AlbDnsName:
    Description: Internal ALB DNS name
    Value: !GetAtt LoadBalancer.DNSName
  DbEndpoint:
    Description: Aurora cluster writer endpoint
    Value: !GetAtt DBCluster.Endpoint.Address
  DbReaderEndpoint:
    Description: Aurora cluster reader endpoint
    Value: !GetAtt DBCluster.ReadEndpoint.Address
  DbCredentialSource:
    Description: Where the DB password lives — Secrets Manager (prod) or SSM SecureString (non-prod)
    Value: !If
      - IsProd
      - !GetAtt DBCluster.MasterUserSecret.SecretArn
      - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/iis/${EnvironmentName}/db-password"
