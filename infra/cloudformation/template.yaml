            - { Name: ROUTE_PREFIX, Value: /observability }
            - { Name: DB_HOST, Value: !GetAtt DBCluster.Endpoint.Address }
            - { Name: DB_PORT, Value: "5432" }
            - { Name: DB_NAME, Value: !Ref DBName }
