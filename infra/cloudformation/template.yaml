      ListenerArn: !Ref Listener
      Priority: 40
      Conditions:
        - Field: path-pattern
          PathPatternConfig: { Values: ["/observability", "/observability/*"] }
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ObservabilityTargetGroup

  ObservabilityTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-observability"
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: observability
          Image: !Sub "${EcrRegistry}/iis-observability:${ImageTag}"
          Essential: true
